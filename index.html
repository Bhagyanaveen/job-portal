<!DOCTYPE html>
<html>
<head>
<title>Important Update</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: black;
  color: white;
}

/* Loading screen */
#loading {
  margin-top: 100px;
}

#bar {
  width: 0%;
  height: 30px;
  background: lime;
}

#container {
  width: 80%;
  background: #333;
  margin: auto;
}

/* Hacker screen */
#hacker {
  display: none;
  margin-top: 50px;
}

/* GIF hidden initially */
#hackGif {
  display: none;
  margin-top: 20px;
  border-radius: 10px;
}

/* 👇 NEW: center class */
#hackGif.show {
  display: block;
  margin-left: auto;
  margin-right: auto;
}

/* Screen flash effect */
.flash {
  animation: flash 0.2s 5;
}

@keyframes flash {
  0% { background: black; }
  50% { background: red; }
  100% { background: black; }
}
</style>

</head>

<body>

<!-- Loading Screen -->
<div id="loading">
  <h2 style="color:Tomato;">Loading Please Wait</h2>
  <div id="container">
    <div id="bar"></div>
  </div>
  <p id="text">0%</p>
</div>

<!-- Hacker Screen -->
<div id="hacker">
  <h2>Your Device is Hacked 😈</h2>
  <p id="hackText"></p>

  <!-- GIF -->
  <img id="foolGif"
       src="‪fool.gif"
       width="300">
</div>

<script>

// Loading animation (slow)
let width = 0;
let interval = setInterval(() => {
  if (width >= 99) {
    clearInterval(interval);
    document.getElementById("loading").style.display = "none";
    startHack();
  } else {
    width++;
    document.getElementById("bar").style.width = width + "%";
    document.getElementById("text").innerHTML = width + "%";
  }
}, 80);


// Hacker function
function startHack() {

  document.getElementById("hacker").style.display = "block";

  let text = "Accessing data... Passwords found...";
  let i = 0;

  function type() {
    if (i < text.length) {
      document.getElementById("hackText").innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 40);
    } else {

      // 👇 CHANGE: show class add (center + display)
      document.getElementById("hackGif").classList.add("show");

      // Screen flash effect
      document.body.classList.add("flash");

      // Final prank delay
      setTimeout(() => {
        alert("😂 APRIL FOOL 😂");
      }, 2500);
    }
  }

  type();
}

</script>

</body>
</html>
